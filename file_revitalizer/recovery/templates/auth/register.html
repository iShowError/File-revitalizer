<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FileRevitalizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .alert-dismiss {
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .alert-dismiss.fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-200 min-h-screen flex items-center justify-center py-12">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <a href="{% url 'home' %}" class="text-2xl font-black gradient-text flex items-center justify-center gap-2 mb-4">
                <i class="fas fa-shield-alt"></i>
                FileRevitalizer
            </a>
            <h1 class="text-2xl font-bold text-slate-800">Create Account</h1>
            <p class="text-slate-600 mt-2">Join thousands of users recovering their data</p>
        </div>

        <!-- Error Messages -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert-dismiss mb-4 p-4 rounded-lg {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200{% elif message.tags == 'success' %}bg-green-50 text-green-700 border border-green-200{% endif %}">
                    <i class="fas fa-exclamation-circle mr-2"></i>{{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Registration Form -->
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <!-- Name Fields -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="first_name" class="block text-sm font-medium text-slate-700 mb-2">First Name</label>
                    <input type="text" id="first_name" name="first_name" required
                           class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           placeholder="John" value="{{ request.POST.first_name|default:'' }}">
                </div>
                <div>
                    <label for="last_name" class="block text-sm font-medium text-slate-700 mb-2">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required
                           class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           placeholder="Doe" value="{{ request.POST.last_name|default:'' }}">
                </div>
            </div>

            <!-- Email Field -->
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                <div class="relative">
                    <input type="email" id="email" name="email" required
                           class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           placeholder="your@email.com" value="{{ request.POST.email|default:'' }}">
                    <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>

            <!-- Password Fields -->
            <div>
                <label for="password1" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <input type="password" id="password1" name="password1" required
                           class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           placeholder="Create a strong password">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
                <p class="text-xs text-slate-500 mt-1">At least 8 characters with numbers and letters</p>
            </div>

            <div>
                <label for="password2" class="block text-sm font-medium text-slate-700 mb-2">Confirm Password</label>
                <div class="relative">
                    <input type="password" id="password2" name="password2" required
                           class="w-full pl-12 pr-4 py-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
                           placeholder="Confirm your password">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                </div>
            </div>

            <!-- Terms Agreement -->
            <div class="flex items-start">
                <input type="checkbox" id="terms" name="terms" required
                       class="mt-1 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                <label for="terms" class="ml-2 text-sm text-slate-600">
                    I agree to the <a href="#" class="text-blue-600 hover:text-blue-800">Terms of Service</a> 
                    and <a href="#" class="text-blue-600 hover:text-blue-800">Privacy Policy</a>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-semibold py-3 px-4 rounded-lg hover:bg-blue-700 transition-all duration-300 shadow-lg shadow-blue-500/20">
                <i class="fas fa-user-plus mr-2"></i>Create Account
            </button>
        </form>

        <!-- Login Link -->
        <div class="mt-6 text-center">
            <p class="text-slate-600">Already have an account? 
                <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-800 font-medium">Sign in here</a>
            </p>
        </div>

        <!-- Back to Home -->
        <div class="mt-4 text-center">
            <a href="{% url 'home' %}" class="text-sm text-slate-500 hover:text-slate-700">
                <i class="fas fa-arrow-left mr-2"></i>Back to Home
            </a>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const alerts = document.querySelectorAll('.alert-dismiss');
            alerts.forEach(function(alert) {
                setTimeout(function() {
                    alert.classList.add('fade-out');
                    setTimeout(function() { alert.remove(); }, 500);
                }, 5000);
            });
        });
    </script>
</body>
</html>
