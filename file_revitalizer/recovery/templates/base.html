<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}File Revitalizer{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #23273a;
            --border: #2e3347;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --danger: #ff4757;
            --warning: #ffa502;
            --text: #e8eaf0;
            --text-muted: #8890a4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        body.layout-fullheight {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: unset;
        }
        /* ── shared nav ── */
        .main-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 56px;
            flex-shrink: 0;
        }
        .main-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: .875rem;
            transition: color .2s;
        }
        .main-nav a:hover, .main-nav a.active { color: var(--text); }
        .main-nav .brand {
            color: var(--accent);
            font-weight: 700;
            font-size: 1rem;
            margin-right: auto;
            text-decoration: none;
        }
        .main-nav .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .main-nav .nav-user { color: var(--text-muted); font-size: .8rem; }
        .agent-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-left: .35rem; vertical-align: middle; }
        .agent-dot.on  { background: #2ed573; box-shadow: 0 0 6px rgba(46,213,115,.5); }
        .agent-dot.off { background: var(--text-muted); }
        /* ── breadcrumbs ── */
        .breadcrumbs { padding: .5rem 2rem; font-size: .78rem; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: .4rem; flex-shrink: 0; }
        .breadcrumbs a { color: var(--text-muted); text-decoration: none; transition: color .15s; }
        .breadcrumbs a:hover { color: var(--text); }
        .breadcrumbs .sep { opacity: .4; }
        .breadcrumbs .current { color: var(--text); font-weight: 600; }
        /* ── toast notifications ── */
        .toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column-reverse; gap: .5rem; pointer-events: none; }
        .toast { pointer-events: auto; min-width: 260px; max-width: 400px; padding: .7rem 1.1rem; border-radius: 8px; font-size: .82rem; font-weight: 600; display: flex; align-items: center; gap: .6rem; animation: toastIn .3s ease; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
        .toast-success { background: #1a3530; color: #2ed573; border: 1px solid #2a4a3a; }
        .toast-error   { background: #3a1a1a; color: var(--danger); border: 1px solid #4a2a2a; }
        .toast-info    { background: #1a2545; color: #5badf0; border: 1px solid #1e4a73; }
        .toast .close-toast { margin-left: auto; cursor: pointer; opacity: .6; background: none; border: none; color: inherit; font-size: 1rem; padding: 0; }
        .toast .close-toast:hover { opacity: 1; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        /* ── accessibility: focus indicators ── */
        :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        /* ── accessibility: reduced motion ── */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
        }
        /* ── mobile nav ── */
        @media (max-width: 600px) {
            .main-nav { padding: 0 1rem; gap: .75rem; overflow-x: auto; }
            .breadcrumbs { padding: .5rem 1rem; flex-wrap: wrap; }
            .toast-container { left: 1rem; right: 1rem; bottom: 1rem; }
            .toast { min-width: 0; max-width: none; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body {% block body_attrs %}{% endblock %}>
{% block body %}
    <nav class="main-nav">
        <a href="{% url 'home' %}" class="brand"><i class="fas fa-shield-alt" aria-hidden="true"></i> FileRevitalizer</a>
        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'cases_list' %}">My Cases</a>
        {% block nav_extra %}{% endblock %}
        <span class="nav-right">
            <span class="nav-user">{{ user.username }}<span class="agent-dot {% if nav_agent_online %}on{% else %}off{% endif %}" title="Agent {% if nav_agent_online %}online{% else %}offline{% endif %}" role="status" aria-label="Agent {% if nav_agent_online %}online{% else %}offline{% endif %}"></span></span>
            <a href="{% url 'logout' %}" aria-label="Log out"><i class="fas fa-sign-out-alt" aria-hidden="true"></i></a>
        </span>
    </nav>
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
    <div class="toast-container" id="toast-container"></div>
{% endblock %}
<script>
function showToast(message, type) {
    type = type || 'info';
    var icons = {success: 'fa-circle-check', error: 'fa-circle-xmark', info: 'fa-circle-info'};
    var c = document.getElementById('toast-container');
    var t = document.createElement('div');
    t.className = 'toast toast-' + type;
    t.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i><span>' +
        message.replace(/</g, '&lt;') + '</span><button class="close-toast" onclick="this.parentElement.remove()">&times;</button>';
    c.appendChild(t);
    setTimeout(function() { if (t.parentElement) t.remove(); }, 4500);
}
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
