name: Build Agent Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Version tag to use for the release (e.g. v0.2.0)'
        required: false

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r agent/requirements.txt

      - name: Build binary with PyInstaller
        run: |
          pyinstaller agent/file-revitalizer-agent.spec
          chmod +x dist/file-revitalizer-agent

      - name: Verify binary runs
        run: |
          ./dist/file-revitalizer-agent --version
          echo "Binary built and verified successfully."

      - name: Generate checksum
        run: |
          cd dist
          sha256sum file-revitalizer-agent > file-revitalizer-agent.sha256
          cat file-revitalizer-agent.sha256

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: file-revitalizer-agent-linux
          path: |
            dist/file-revitalizer-agent
            dist/file-revitalizer-agent.sha256
          retention-days: 30

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/file-revitalizer-agent
            dist/file-revitalizer-agent.sha256
          generate_release_notes: true
          body: |
            ## File Revitalizer Agent — ${{ github.ref_name }}

            ### Download

            | Platform | File | Checksum |
            |----------|------|----------|
            | Linux x86_64 | `file-revitalizer-agent` | See `.sha256` file |

            ### Quick Start

            ```bash
            # Download and make executable
            chmod +x file-revitalizer-agent

            # Verify installation
            ./file-revitalizer-agent --version

            # Check available devices
            ./file-revitalizer-agent list-devices

            # Health check (verify btrfs tools + server connectivity)
            ./file-revitalizer-agent health --server http://YOUR_SERVER:8000 --token YOUR_TOKEN

            # Full scan + upload
            ./file-revitalizer-agent scan --device /dev/sdb --case-id 1
            ```

            See [Agent README](https://github.com/${{ github.repository }}/blob/main/agent/README.md) for full documentation.
